<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ComicReader Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent: #e50914;
            --sidebar-w: min(280px, 80vw);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #sidebar {
            position: fixed; left: calc(var(--sidebar-w) * -1); top: 0;
            width: var(--sidebar-w); height: 100%;
            background: #111; border-right: 1px solid #222;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
            display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }

        #sidebar-toggle {
            position: absolute; right: -44px; top: 50%; transform: translateY(-50%);
            background: #1a1a1a; color: #aaa; border: 1px solid #333;
            width: 44px; height: 56px; cursor: pointer; border-radius: 0 8px 8px 0;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s; touch-action: manipulation;
        }
        #sidebar-toggle:hover, #sidebar-toggle:active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #sidebar-tabs { display: flex; border-bottom: 1px solid #222; }
        .stab {
            flex: 1; padding: 14px 0; text-align: center; font-size: 11px;
            font-weight: 700; letter-spacing: 0.08em; cursor: pointer;
            color: #555; border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s; text-transform: uppercase;
            min-height: 44px; display: flex; align-items: center; justify-content: center;
        }
        .stab:hover { color: #aaa; }
        .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

        #panel-pages { flex-grow: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; align-items: center; -webkit-overflow-scrolling: touch; }
        .thumb-item { width: 88%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; border-radius: 4px; opacity: 0.6; }
        .thumb-item:hover, .thumb-item:active { opacity: 1; border-color: #555; }
        .thumb-item.active { opacity: 1; border-color: var(--accent); background: rgba(229, 9, 20, 0.08); transform: scale(1.04); }

        #panel-info { display: none; flex-grow: 1; overflow-y: auto; padding: 20px 16px; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
        #panel-info.visible { display: flex; }

        #info-cover-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 6px; }
        #info-cover { width: 80%; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: none; }

        .info-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; text-align: center; }
        .info-subtitle { font-size: 12px; color: var(--accent); text-align: center; margin-top: -6px; letter-spacing: 0.05em; }
        .info-divider { height: 1px; background: #222; margin: 4px 0; }
        .info-row { display: flex; flex-direction: column; gap: 2px; }
        .info-row .lbl { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
        .info-row .val { font-size: 13px; color: #ccc; line-height: 1.4; }
        .info-empty { color: #444; font-size: 13px; text-align: center; margin-top: 30px; }

        #reader-page { display: none; flex-direction: column; height: 100vh; height: 100dvh; transition: margin-left 0.3s; }
        #reader-page.shifted { margin-left: var(--sidebar-w); }

        header {
            background: #0e0e0e; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1e1e1e; min-height: 48px; flex-shrink: 0;
        }

        #close-btn {
            background: none; border: none; color: #666; cursor: pointer;
            font-size: 12px; letter-spacing: 0.04em; padding: 8px 4px; min-width: 44px; min-height: 44px;
            display: flex; align-items: center;
        }
        #close-btn:hover, #close-btn:active { color: #fff; }

        #progress-wrapper { width: 100%; height: 24px; background: #111; cursor: pointer; position: relative; flex-shrink: 0; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        #progress-info { position: absolute; width: 100%; text-align: center; top: 4px; font-size: 11px; pointer-events: none; font-weight: 700; color: #fff; letter-spacing: 0.04em; }

        #viewer-container {
            flex-grow: 1; overflow: hidden; display: flex; justify-content: center; align-items: center;
            background: #050505; position: relative; touch-action: none;
        }
        .view-canvas { display: flex; gap: 6px; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .comic-img {
            max-height: 100%; max-width: 50%; object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .comic-img.single { max-width: 100%; }
        .is-cover { max-width: 100% !important; animation: entradaComic 0.6s ease-out forwards; }
        @keyframes entradaComic { from { opacity: 0; transform: scale(0.93); } to { opacity: 1; transform: scale(1); } }

        #swipe-hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: #333; letter-spacing: 0.08em; pointer-events: none;
            animation: fadeHint 3s ease-out forwards;
        }
        @keyframes fadeHint { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

        /* Header buttons — desktop dropdown style */
        .hdr-btns { display: flex; gap: 6px; align-items: center; }
        .dropdown { position: relative; display: inline-block; }
        .drop-btn {
            background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a;
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
            transition: background 0.2s, color 0.2s; min-height: 44px;
        }
        .drop-btn:hover { background: #252525; color: #fff; }
        .drop-content {
            display: none; position: absolute; background: #1a1a1a; min-width: 150px;
            top: calc(100% + 4px); right: 0; border: 1px solid #2a2a2a; border-radius: 4px; z-index: 1100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .dropdown.open .drop-content { display: block; }
        .drop-content button {
            width: 100%; padding: 13px 14px; background: none; border: none;
            color: #ccc; text-align: left; cursor: pointer; font-size: 12px; min-height: 44px;
        }
        .drop-content button:hover, .drop-content button:active { background: var(--accent); color: #fff; }

        footer {
            background: #000; padding: 10px 16px;
            display: flex; justify-content: center; gap: 16px; flex-shrink: 0;
        }
        .nav-btn {
            padding: 12px 0; cursor: pointer; background: #1a1a1a; color: #ccc;
            border: 1px solid #2a2a2a; border-radius: 4px; font-weight: 700;
            font-size: 12px; letter-spacing: 0.06em; transition: background 0.2s, color 0.2s;
            flex: 1; max-width: 180px; min-height: 48px;
        }
        .nav-btn:hover, .nav-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #landing-page {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; gap: 14px; padding: 20px; text-align: center;
        }
        #landing-page h1 { font-size: clamp(1.8rem, 8vw, 2.4rem); letter-spacing: -0.02em; margin: 0 0 8px; }
        #landing-page p { color: #555; font-size: 13px; margin: 0 0 16px; }
        .btn-load {
            background: var(--accent); color: white; padding: 16px 48px;
            border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px;
            letter-spacing: 0.06em; transition: opacity 0.2s;
            min-height: 54px; display: flex; align-items: center;
        }
        .btn-load:hover, .btn-load:active { opacity: 0.85; }

        #github-dock {
            position: fixed; top: 16px; right: 16px;
            display: flex; flex-direction: row; gap: 8px;
            z-index: 2000;
        }

        .gh-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #aaa;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 8px 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
            cursor: pointer;
            line-height: 1.6;
            box-shadow: 2px 2px 0 #000;
            letter-spacing: 0;
        }

        .gh-btn svg {
            width: 14px; height: 14px; fill: currentColor; flex-shrink: 0;
        }

        .gh-btn:hover, .gh-btn:active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #000;
        }

        .gh-btn::before {
            content: '▶';
            font-size: 5px;
            color: var(--accent);
            flex-shrink: 0;
        }
        .gh-btn:hover::before, .gh-btn:active::before { color: #fff; }

        /* Zoom controls */
        #zoom-controls {
            display: flex; align-items: center; gap: 4px;
        }
        .zoom-btn {
            background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a;
            width: 36px; height: 36px; border-radius: 4px; cursor: pointer;
            font-size: 16px; font-weight: 700; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s; min-height: 44px; min-width: 36px;
        }
        .zoom-btn:hover, .zoom-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
        #zoom-label {
            font-size: 10px; color: #555; min-width: 36px; text-align: center;
            letter-spacing: 0.04em; font-weight: 700; user-select: none;
        }

        #viewer-container {
            overflow: hidden;
        }
        #canvas {
            transform-origin: center center;
            transition: transform 0.15s ease;
            cursor: grab;
        }
        #canvas.dragging { cursor: grabbing; transition: none; }

        #panel-pages::-webkit-scrollbar, #panel-info::-webkit-scrollbar { width: 4px; }
        #panel-pages::-webkit-scrollbar-track, #panel-info::-webkit-scrollbar-track { background: transparent; }
        #panel-pages::-webkit-scrollbar-thumb, #panel-info::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        @media (max-width: 600px) {
            .comic-img { max-width: 50%; max-height: 100%; }
            .comic-img.single, .is-cover { max-width: 100% !important; }

            header { padding: 6px 10px; }
            footer { padding: 8px 10px; gap: 10px; }
            .drop-btn { padding: 6px 10px; font-size: 10px; }

            #close-btn { font-size: 11px; }

            .gh-btn { font-size: 6px; padding: 7px 9px; }
        }

        @media (max-width: 380px) {
            .gh-btn { font-size: 5.5px; padding: 6px 8px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <button id="sidebar-toggle" onclick="toggleSidebar()">▶</button>

        <div id="sidebar-tabs">
            <div class="stab active" id="tab-pages" onclick="switchTab('pages')">📄 Pages</div>
            <div class="stab" id="tab-info" onclick="switchTab('info')">ℹ Info</div>
        </div>

        <div id="panel-pages"></div>

        <div id="panel-info">
            <div id="info-cover-wrap">
                <img id="info-cover" alt="Portada">
            </div>
            <div class="info-empty" id="info-no-data">No Info</div>
        </div>
    </div>

    <div id="landing-page">
        <h1>Comic<span style="color:var(--accent)">Reader</span></h1>
        <p>Open your Comic (.cbz / .cbr)</p>
        <label for="fileInput" class="btn-load">Upload File</label>
        <input type="file" id="fileInput" accept=".cbz,.cbr,.zip,.rar" style="display:none">
    </div>

    <div id="reader-page">
        <header>
            <button id="close-btn" onclick="location.reload()">← Close</button>
            <div class="hdr-btns">
                <div id="zoom-controls">
                    <button class="zoom-btn" onclick="changeZoom(-0.25)" title="Zoom Out">−</button>
                    <span id="zoom-label">100%</span>
                    <button class="zoom-btn" onclick="changeZoom(0.25)" title="Zoom In">+</button>
                    <button class="zoom-btn" onclick="resetZoom()" title="Reset Zoom" style="font-size:11px;">⊙</button>
                </div>
                <div class="dropdown" id="dd-view">
                    <button class="drop-btn" onclick="toggleDropdown('dd-view')">View ▾</button>
                    <div class="drop-content">
                        <button onclick="updateVMode('single'); closeDropdowns()">One Page</button>
                        <button onclick="updateVMode('double'); closeDropdowns()">Double Page</button>
                    </div>
                </div>
                <div class="dropdown" id="dd-read">
                    <button class="drop-btn" onclick="toggleDropdown('dd-read')">Reading ▾</button>
                    <div class="drop-content">
                        <button onclick="updateFMode('comic'); closeDropdowns()">Cómic (L→R)</button>
                        <button onclick="updateFMode('manga'); closeDropdowns()">Manga (R←L)</button>
                    </div>
                </div>
            </div>
            <span style="font-size:9px; color:#333; letter-spacing:0.1em;">v3.2</span>
        </header>

        <div id="progress-wrapper" onclick="jumpTo(event)">
            <div id="progress-fill"></div>
            <div id="progress-info">Loading...</div>
        </div>

        <div id="viewer-container">
            <div id="canvas" class="view-canvas">
                <img id="imgL" class="comic-img">
                <img id="imgR" class="comic-img">
            </div>
            <div id="swipe-hint">← SWIPE →</div>
        </div>

        <footer>
            <button class="nav-btn" onclick="changeP(-1)">◀ PREV</button>
            <button class="nav-btn" onclick="changeP(1)">NEXT ▶</button>
        </footer>
    </div>

    <div id="github-dock">
        <a class="gh-btn" href="https://github.com/Ovejoide" target="_blank" rel="noopener">

            MY GITHUB
        </a>
        <a class="gh-btn" href="https://github.com/Ovejoide/ComicReader" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            REPO / COMICREADER
        </a>
    </div>

    <script>
        let images = [];
        let index = 0;
        let vMode = 'double';
        let fMode = 'comic';
        let comicMetadata = null;

        if (window.innerWidth <= 600) { vMode = 'single'; }

        const fileInput = document.getElementById('fileInput');

        // --- Loader helpers ---

        async function loadCBZ(file) {
            const zip = await JSZip.loadAsync(file);

            const xmlFile = zip.file("ComicInfo.xml");
            if (xmlFile) {
                const xmlText = await xmlFile.async("string");
                parseComicInfo(xmlText);
            }

            const files = Object.keys(zip.files)
                .filter(n => /\.(jpg|jpeg|png|webp|gif)$/i.test(n))
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

            return Promise.all(files.map(async n =>
                URL.createObjectURL(await zip.files[n].async('blob'))
            ));
        }

        async function loadCBR(file) {
            const buf = await file.arrayBuffer();
            const uint8 = new Uint8Array(buf);

            // Validate RAR magic bytes: 52 61 72 21 (Rar!)
            const isRar = uint8[0]===0x52 && uint8[1]===0x61 && uint8[2]===0x72 && uint8[3]===0x21;

            if (!isRar) {
                // Maybe it's a ZIP renamed as .cbr — try JSZip as fallback
                try { return await loadCBZ(file); } catch(_) {}
                throw new Error('El archivo no es un RAR válido ni un ZIP.');
            }

            // Load node-unrar-js as ESM via dynamic import (only once)
            if (!window._createExtractorFromData) {
                try {
                    const mod = await import('https://cdn.jsdelivr.net/npm/node-unrar-js@2.0.0/esm/js/unrar.js');
                    window._createExtractorFromData = mod.createExtractorFromData;
                } catch(e) {
                    throw new Error('No se pudo cargar la librería RAR: ' + e.message);
                }
            }
            const createExtractorFromData = window._createExtractorFromData;

            const extractor = await createExtractorFromData({ data: buf });
            const extracted = extractor.extract({ files: (hdr) => /\.(jpg|jpeg|png|webp|gif)$/i.test(hdr.name) });

            const fileList = [...extracted.files];
            fileList.sort((a, b) => a.fileHeader.name.localeCompare(b.fileHeader.name, undefined, { numeric: true }));

            // Try ComicInfo.xml if present
            try {
                const xmlExtractor = await createExtractorFromData({ data: buf });
                const xmlResult = xmlExtractor.extract({ files: (hdr) => hdr.name === 'ComicInfo.xml' });
                const xmlFiles = [...xmlResult.files];
                if (xmlFiles.length > 0 && xmlFiles[0].extraction) {
                    const xmlText = new TextDecoder().decode(xmlFiles[0].extraction);
                    parseComicInfo(xmlText);
                }
            } catch(_) {}

            return fileList
                .filter(f => f.extraction)
                .map(f => {
                    const ext = f.fileHeader.name.split('.').pop().toLowerCase();
                    const mimeMap = { jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', webp:'image/webp', gif:'image/gif' };
                    const mime = mimeMap[ext] || 'image/jpeg';
                    const blob = new Blob([f.extraction], { type: mime });
                    return URL.createObjectURL(blob);
                });
        }

        function setLoadingState(on) {
            const lbl = document.querySelector('.btn-load');
            if (lbl) lbl.textContent = on ? 'Cargando…' : 'Upload File';
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setLoadingState(true);

            try {
                const isCBR = /\.cbr$/i.test(file.name) || /\.rar$/i.test(file.name);
                images = isCBR ? await loadCBR(file) : await loadCBZ(file);
            } catch (err) {
                setLoadingState(false);
                alert('Error al abrir el archivo:\n' + err.message);
                return;
            }

            setLoadingState(false);

            generateThumbs();

            if (images.length > 0) {
                const cover = document.getElementById('info-cover');
                cover.src = images[0];
                cover.style.display = 'block';
            }

            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('reader-page').style.display = 'flex';
            render();
            setupSwipe();
            setupZoomEvents();
        };

        function parseComicInfo(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const getTag = (tag) => xmlDoc.getElementsByTagName(tag)[0]?.textContent?.trim() || null;

            comicMetadata = {
                title:      getTag("Title"),
                series:     getTag("Series"),
                number:     getTag("Number"),
                writer:     getTag("Writer"),
                penciller:  getTag("Penciller"),
                inker:      getTag("Inker"),
                colorist:   getTag("Colorist"),
                publisher:  getTag("Publisher"),
                year:       getTag("Year"),
                month:      getTag("Month"),
                genre:      getTag("Genre"),
                pageCount:  getTag("PageCount"),
                language:   getTag("LanguageISO"),
                summary:    getTag("Summary"),
            };

            buildInfoPanel();
        }

        function buildInfoPanel() {
            const panel = document.getElementById('panel-info');
            const noData = document.getElementById('info-no-data');
            if (!comicMetadata) return;

            noData.style.display = 'none';

            const m = comicMetadata;
            const fields = [
                { lbl: 'Serie',       val: [m.series, m.number ? '#' + m.number : null].filter(Boolean).join(' ') || m.title },
                { lbl: 'Title',       val: m.title },
                { lbl: 'Guion',       val: m.writer },
                { lbl: 'Penciller',   val: m.penciller },
                { lbl: 'Inker',       val: m.inker },
                { lbl: 'Color',       val: m.colorist },
                { lbl: 'Editorial',   val: m.publisher },
                { lbl: 'Year',        val: m.year },
                { lbl: 'Genre',       val: m.genre },
                { lbl: 'Pages',       val: m.pageCount },
                { lbl: 'Language',    val: m.language },
            ].filter(f => f.val);

            let html = '';
            if (m.series || m.title) {
                html += `<div class="info-title">${m.series || m.title}</div>`;
                if (m.number) html += `<div class="info-subtitle">Número #${m.number}</div>`;
            }
            html += '<div class="info-divider"></div>';

            fields.forEach(f => {
                if (f.lbl === 'Serie' || (f.lbl === 'Título' && m.series)) return;
                html += `<div class="info-row"><span class="lbl">${f.lbl}</span><span class="val">${f.val}</span></div>`;
            });

            if (m.summary) {
                html += '<div class="info-divider"></div>';
                html += `<div class="info-row"><span class="lbl">Sinopsis</span><span class="val">${m.summary}</span></div>`;
            }

            const cover = document.getElementById('info-cover-wrap');
            cover.insertAdjacentHTML('afterend', html);
        }

        function switchTab(tab) {
            const pagePanel = document.getElementById('panel-pages');
            const infoPanel = document.getElementById('panel-info');
            document.getElementById('tab-pages').classList.toggle('active', tab === 'pages');
            document.getElementById('tab-info').classList.toggle('active', tab === 'info');
            pagePanel.style.display   = tab === 'pages' ? 'flex' : 'none';
            infoPanel.classList.toggle('visible', tab === 'info');
        }

        function generateThumbs() {
            const tc = document.getElementById('panel-pages');
            tc.innerHTML = images.map((src, i) => `
                <img src="${src}" class="thumb-item" onclick="goToPage(${i}); if(window.innerWidth<600) toggleSidebar();" loading="lazy" title="Pág. ${i + 1}">
            `).join('');
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('reader-page').classList.toggle('shifted');
            document.getElementById('sidebar-toggle').innerText = sb.classList.contains('open') ? '◀' : '▶';
        }

        function toggleDropdown(id) {
            const dd = document.getElementById(id);
            const wasOpen = dd.classList.contains('open');
            closeDropdowns();
            if (!wasOpen) dd.classList.add('open');
        }
        function closeDropdowns() {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) closeDropdowns();
        });

        function render() {
            const L = document.getElementById('imgL');
            const R = document.getElementById('imgR');
            if (!L) return;

            const isCover = (index === 0);
            const isMobile = window.innerWidth <= 600;

            L.classList.remove('single');
            R.classList.remove('single');

            if (isCover || vMode === 'single' || isMobile) {
                L.src = images[index];
                L.classList.add(isCover ? 'is-cover' : 'single');
                if (!isCover) L.classList.remove('is-cover');
                L.style.display = 'block';
                R.style.display = 'none';
            } else {
                L.classList.remove('is-cover');
                if (fMode === 'manga') {
                    R.src = images[index];
                    L.src = images[index + 1] || '';
                    R.style.display = 'block';
                    L.style.display = images[index + 1] ? 'block' : 'none';
                } else {
                    L.src = images[index];
                    R.src = images[index + 1] || '';
                    L.style.display = 'block';
                    R.style.display = images[index + 1] ? 'block' : 'none';
                }
            }

            updateBar();
            highlightThumb();
        }

        function changeP(d) {
            const isMobile = window.innerWidth <= 600;
            resetZoom();
            if (vMode === 'single' || index === 0 || isMobile) {
                const n = index + d;
                if (n >= 0 && n < images.length) { index = n; render(); }
            } else {
                let n = index + (d * 2);
                if (d < 0 && n <= 0) n = 0;
                if (n >= 0 && n < images.length) { index = n; render(); }
            }
        }

        function goToPage(i) { index = i; resetZoom(); render(); }
        function updateVMode(m) { vMode = m; render(); }
        function updateFMode(m) { fMode = m; render(); }

        function updateBar() {
            const total = images.length;
            const pct = Math.round(((index + 1) / total) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-info').innerText = `Pág. ${index + 1} / ${total}`;
        }

        function highlightThumb() {
            const thumbs = document.querySelectorAll('.thumb-item');
            thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
            const active = document.querySelector('.thumb-item.active');
            if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function jumpTo(e) {
            const rect = document.getElementById('progress-wrapper').getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            index = Math.floor(pct * images.length);
            render();
        }

        function setupSwipe() {
            const vc = document.getElementById('viewer-container');
            let startX = 0, startY = 0;

            vc.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            vc.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (zoomLevel > 1) return; // panning handled by zoom events
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                    if (dx < 0) {
                        fMode === 'manga' ? changeP(-1) : changeP(1);
                    } else {
                        fMode === 'manga' ? changeP(1) : changeP(-1);
                    }
                }
            }, { passive: true });
        }

        // --- Zoom state ---
        let zoomLevel = 1;
        const ZOOM_MIN = 0.5;
        const ZOOM_MAX = 4;
        let panX = 0, panY = 0;
        let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;

        function applyZoom() {
            const canvas = document.getElementById('canvas');
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
        }

        function changeZoom(delta) {
            zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel + delta));
            if (zoomLevel === 1) { panX = 0; panY = 0; }
            applyZoom();
        }

        function resetZoom() {
            zoomLevel = 1; panX = 0; panY = 0;
            applyZoom();
        }

        function clampPan() {
            const vc = document.getElementById('viewer-container');
            const canvas = document.getElementById('canvas');
            const vcW = vc.clientWidth, vcH = vc.clientHeight;
            const cW = canvas.clientWidth, cH = canvas.clientHeight;
            const maxX = Math.max(0, (cW * zoomLevel - vcW) / 2);
            const maxY = Math.max(0, (cH * zoomLevel - vcH) / 2);
            panX = Math.min(maxX, Math.max(-maxX, panX));
            panY = Math.min(maxY, Math.max(-maxY, panY));
        }

        function setupZoomEvents() {
            const vc = document.getElementById('viewer-container');

            // Mouse wheel zoom
            vc.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.15 : -0.15;
                zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel + delta));
                if (zoomLevel === 1) { panX = 0; panY = 0; }
                clampPan();
                applyZoom();
            }, { passive: false });

            // Mouse drag pan
            vc.addEventListener('mousedown', (e) => {
                if (zoomLevel <= 1) return;
                isPanning = true;
                panStartX = e.clientX - panX;
                panStartY = e.clientY - panY;
                document.getElementById('canvas').classList.add('dragging');
            });
            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                panX = e.clientX - panStartX;
                panY = e.clientY - panStartY;
                clampPan();
                applyZoom();
            });
            window.addEventListener('mouseup', () => {
                isPanning = false;
                document.getElementById('canvas').classList.remove('dragging');
            });

            // Touch: pinch-to-zoom + pan
            let lastDist = null;
            let lastMidX = 0, lastMidY = 0;
            let touchPanStartX = 0, touchPanStartY = 0;
            let touchPanOriginX = 0, touchPanOriginY = 0;
            let isTouchPanning = false;

            vc.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    lastDist = null;
                    isTouchPanning = false;
                } else if (e.touches.length === 1 && zoomLevel > 1) {
                    isTouchPanning = true;
                    touchPanStartX = e.touches[0].clientX;
                    touchPanStartY = e.touches[0].clientY;
                    touchPanOriginX = panX;
                    touchPanOriginY = panY;
                }
            }, { passive: true });

            vc.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (lastDist !== null) {
                        const scale = dist / lastDist;
                        zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel * scale));
                        if (zoomLevel === 1) { panX = 0; panY = 0; }
                        clampPan();
                        applyZoom();
                    }
                    lastDist = dist;
                } else if (e.touches.length === 1 && isTouchPanning && zoomLevel > 1) {
                    e.preventDefault();
                    panX = touchPanOriginX + (e.touches[0].clientX - touchPanStartX);
                    panY = touchPanOriginY + (e.touches[0].clientY - touchPanStartY);
                    clampPan();
                    applyZoom();
                }
            }, { passive: false });

            vc.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) lastDist = null;
                if (e.touches.length === 0) isTouchPanning = false;
            }, { passive: true });
        }

        window.onkeydown = (e) => {
            if (e.key === 'ArrowRight') fMode === 'manga' ? changeP(-1) : changeP(1);
            if (e.key === 'ArrowLeft')  fMode === 'manga' ? changeP(1)  : changeP(-1);
            if (e.key === '+' || e.key === '=') changeZoom(0.25);
            if (e.key === '-') changeZoom(-0.25);
            if (e.key === '0') resetZoom();
        };

        window.addEventListener('resize', () => {
            if (images.length > 0) render();
        });
    </script>
</body>
</html>
